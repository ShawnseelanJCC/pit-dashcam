load_module modules/ngx_rtmp_module.so;

worker_processes auto;
events {
    worker_connections 1024;
}

# RTMP ingest — receives stream from Larix Broadcaster on port 1935
rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # Low-latency HLS: 500ms segments, 3s rolling playlist
            hls on;
            hls_path /tmp/hls;
            hls_fragment 500ms;      # EDIT THIS — increase to 1s if stream is unstable
            hls_playlist_length 3s;  # EDIT THIS — increase to 6s for more buffer
        }
    }
}

# HTTP server — serves dashboard on port 80 and HLS segments on port 8080
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Pit wall dashboard — open http://SERVER_IP/ in browser
    server {
        listen 80;

        root /var/www/pitcam;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # HLS stream endpoint
    server {
        listen 8080;

        # Health check endpoint
        location / {
            return 200 'JRT PitCam — nginx OK\n';
            add_header Content-Type text/plain;
        }

        location /live/ {
            alias /tmp/hls/;

            types {
                application/vnd.apple.mpegurl m3u8;
                video/MP2T                    ts;
            }

            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Range' always;
            add_header Cache-Control no-cache always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }
    }
}

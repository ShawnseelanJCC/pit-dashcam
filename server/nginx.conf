load_module modules/ngx_rtmp_module.so;

worker_processes auto;
events {
    worker_connections 1024;
}

# RTMP ingest — receives stream from Larix Broadcaster on port 1935
rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # Low-latency HLS: 500ms segments, 3s rolling playlist
            hls on;
            hls_path /tmp/hls;
            hls_fragment 500ms;      # EDIT THIS — increase to 1s if stream is unstable
            hls_playlist_length 3s;  # EDIT THIS — increase to 6s for more buffer
        }
    }
}

# HTTP server — serves HLS segments to pit wall browser on port 8080
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 8080;

        # Health check endpoint
        location / {
            return 200 'JRT PitCam — nginx OK\n';
            add_header Content-Type text/plain;
        }

        # HLS stream endpoint
        location /live/ {
            alias /tmp/hls/;

            # Required MIME types for HLS
            types {
                application/vnd.apple.mpegurl m3u8;
                video/MP2T                    ts;
            }

            # CORS — required for hls.js in browser
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Access-Control-Allow-Headers 'Range';

            # Prevent stale playlist caching
            add_header Cache-Control no-cache;

            # Preflight
            if ($request_method = OPTIONS) {
                return 204;
            }
        }
    }
}
